<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Monitor - Onboarding</title>

    <link rel="stylesheet" href="/assets/deps/bootstrap-5.3.8/css/bootstrap.css">
    <script src="/assets/deps/bootstrap-5.3.8/js/bootstrap.bundle.js"></script>
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/components/button.css">
    <link rel="stylesheet" href="/assets/css/components/spinner.css">
    <link rel="stylesheet" href="/assets/css/components/form-control.css">
    <link rel="stylesheet" href="/assets/css/components/progress.css">

    <link rel="icon" href="/assets/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/favicon/android-chrome-512x512.png">
    <link rel="apple-touch-icon" href="/assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">

    <script src="/assets/deps/moment.js-2.30.1/moment.js"></script>
    <script src="/assets/deps/chart.js-4.5.1/chart.js"></script>
    <script src="/assets/deps/zxcvbn/zxcvbn.js"></script>
    <script src="/assets/js/dark-mode.js"></script>
</head>
<body>


<div class="container py-5">
    <div class="row justify-content-center mb-4">
        <div class="col-md-6">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <small class="text-muted" id="step-label">Step 5 of 6</small>
            </div>
            <div class="progress" style="height:4px;">
                <div class="progress-bar" role="progressbar" style="width:83%"></div>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h5 class="card-title fw-bold mb-1">Create Account</h5>
                    <p class="text-muted small mb-4">Set up your administrator account. You&#39;ll use these credentials to log in and manage the status monitor.</p>

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" placeholder="johndoe">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" placeholder="••••••••••••" autocomplete="new-password">
                            <button class="btn btn-outline-secondary" type="button" id="toggle_password_btn">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                        <div class="mt-2">
                            <div class="progress" style="height: 4px;">
                                <div class="progress-bar" id="password-strength-bar" role="progressbar" style="width: 0%;"></div>
                            </div>
                            <small class="text-muted" id="password-strength-label"></small>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="confirm_password" placeholder="••••••••••••" autocomplete="new-password">
                            <button class="btn btn-outline-secondary" type="button" id="toggle_confirm_password_btn">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                        <small class="text-danger d-none" id="password-match-error">Passwords don&#39;t match.</small>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <button type="button" class="btn btn-primary" id="create_account">Create Account</button>
                    </div>
                    <div id="register-error" class="alert alert-danger mt-3 d-none"></div>
                </div>
            </div>
        </div>
    </div>
</div>



<script src="/assets/js/localization.js"></script>
<script src="/assets/js/toast.js"></script>
<script src="/assets/js/onboarding/check.js"></script>
<script src="/assets/js/onboarding/account.js"></script>
</body>
</html>
