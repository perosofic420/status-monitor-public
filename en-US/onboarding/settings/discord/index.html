<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Monitor - Onboarding</title>

    <link rel="stylesheet" href="/assets/deps/bootstrap-5.3.8/css/bootstrap.css">
    <script src="/assets/deps/bootstrap-5.3.8/js/bootstrap.bundle.js"></script>
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/components/button.css">
    <link rel="stylesheet" href="/assets/css/components/spinner.css">
    <link rel="stylesheet" href="/assets/css/components/form-check.css">
    <link rel="stylesheet" href="/assets/css/components/form-control.css">
    <link rel="stylesheet" href="/assets/css/components/progress.css">

    <link rel="icon" href="/assets/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/favicon/android-chrome-512x512.png">
    <link rel="apple-touch-icon" href="/assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">

    <script src="/assets/deps/moment.js-2.30.1/moment.js"></script>
    <script src="/assets/deps/chart.js-4.5.1/chart.js"></script>
    <script src="/assets/js/dark-mode.js"></script>
</head>
<body>


<div class="container py-5">
    <div class="row justify-content-center mb-4">
        <div class="col-md-6">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <small class="text-muted" id="step-label">Step 2 of 6</small>
            </div>
            <div class="progress" style="height:4px;">
                <div class="progress-bar" role="progressbar" style="width:33%"></div>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h5 class="card-title fw-bold mb-1">Discord Bot Settings</h5>
                    <p class="text-muted small mb-4">Set up your discord client ID and bot token.</p>

                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="discord_bot_toggle">
                            <label class="form-check-label" for="discord_bot_toggle">Enable</label>
                        </div>
                    </div>
                    
                    <div class="d-none" id="discord_info_container">
                        <div class="mb-3">
                            <label class="form-label">Client ID</label>
                            <input type="text" class="form-control rounded-2" id="client_id" placeholder="000000000000000000">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Token</label>
                            <div class="d-flex">
                                <input type="password" class="form-control rounded-0 rounded-start-2" id="client_token">
                                <button type="button" class="btn btn-outline-secondary rounded-end-2 rounded-0" id="show_client_token_btn">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <button type="button" class="btn btn-primary" id="confirm_settings_btn">Next</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>



<script src="/assets/js/localization.js"></script>
<script src="/assets/js/toast.js"></script>
<script src="/assets/js/en-US/onboarding/check.js"></script>
<script src="/assets/js/en-US/onboarding/settings/discord.js"></script>
</body>
</html>
