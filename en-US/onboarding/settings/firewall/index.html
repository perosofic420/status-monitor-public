<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Monitor - Onboarding</title>

    <link rel="stylesheet" href="/assets/deps/bootstrap-5.3.8/css/bootstrap.css">
    <script src="/assets/deps/bootstrap-5.3.8/js/bootstrap.bundle.js"></script>
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/components/button.css">
    <link rel="stylesheet" href="/assets/css/components/spinner.css">
    <link rel="stylesheet" href="/assets/css/components/form-check.css">
    <link rel="stylesheet" href="/assets/css/components/form-select.css">
    <link rel="stylesheet" href="/assets/css/components/progress.css">

    <link rel="icon" href="/assets/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/favicon/android-chrome-512x512.png">
    <link rel="apple-touch-icon" href="/assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">

    <script src="/assets/deps/moment.js-2.30.1/moment.js"></script>
    <script src="/assets/deps/chart.js-4.5.1/chart.js"></script>
    <script src="/assets/js/dark-mode.js"></script>
</head>
<body>


<div class="container py-5">
    <div class="row justify-content-center mb-4">
        <div class="col-md-6">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <small class="text-muted" id="step-label">Step 3 of 6</small>
            </div>
            <div class="progress" style="height:4px;">
                <div class="progress-bar" role="progressbar" style="width:50%"></div>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h5 class="card-title fw-bold mb-1">Firewall Settings</h5>
                    <p class="text-muted small mb-4">Enable or disable the firewall. When enabled, iptables and ipset rules are applied to ports 80 and 443 (HTTP/HTTPS), restricting inbound traffic to known Cloudflare or BunnyCDN IP ranges only - blocking any direct access that bypasses your CDN proxy.</p>

                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="firewall_toggle">
                            <label class="form-check-label" for="firewall_toggle">Enable</label>
                        </div>
                    </div>

                    <div class="d-none" id="firewall_info_container">
                        <div class="mb-3">
                            <label class="form-label">CDN Provider</label>
                            <select class="form-select" id="select_firewall_provider">
                                <option value="cloudflare">Cloudflare</option>
                                <option value="bunnycdn">BunnyCDN</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <button type="button" class="btn btn-primary" id="confirm_settings_btn">Next</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>



<script src="/assets/js/localization.js"></script>
<script src="/assets/js/toast.js"></script>
<script src="/assets/js/en-US/onboarding/check.js"></script>
<script src="/assets/js/en-US/onboarding/settings/firewall.js"></script>
</body>
</html>
